# LeetCode 笔记格式化工具

将 LeetCode 题解按 `CLAUDE.md` 中定义的项目风格整理成统一格式的笔记。

## 工作流程

1. **提取题目信息** — 从用户消息中提取题号、标题和 LeetCode 链接。
2. **确定标签** — 根据题目的算法类型匹配标签（参考下面标签映射）。
3. **格式化笔记** — 按以下规则依次组织内容。

### 格式模板

```
#{标签1} {标签2}
[{题号}. {题目标题 - 力扣（LeetCode）]({URL})

>{版本标签}
```python
{代码}
```

>{版本标签}
```python
{代码}
```

[可选的方法论部分：错误分析、口诀、对比表格等]

>下一版
```python

```
```

### 版本标签对照

根据用户的描述选择合适的标签：

| 用户说的 | 标签写法 |
|---|---|
| 错了 / 没过 / 边界不对 | `>第一版wrong` 或 `>错误版` |
| 超时 / TLE | `>超时` |
| 有 bug / 报错 | `>报错版` |
| 通过了 / pass / accepted | `>第一版通过` 或 `>通过` |
| 手写 / 自己写的 | `>手写版` 或 `>我的题解` |
| GPT / AI 帮改 | `>GPT版` 或 `>GPT改进` |
| Gemini 帮改 | `>Gemini版` 或 `>Gemini标准版` |
| 提示后通过 | `>提示通过版` |
| 修正 / 改正后 | `>改正版` 或 `>修正版` |
| 日期标注 | 直接写 `>2026年3月8日` |
| 最终版 | `>最终通过` 或 `>通过` |

### 标签映射

| 算法模式 | 标签 |
|---|---|
| 哈希表 / map / set / dict | `#哈希表` |
| 字符串 / 子串 / 回文 | `#字符串` |
| 滑动窗口 | `#滑动窗口` |
| 栈 / 括号 / 单调栈 | `#栈` |
| 链表 | `#链表` |
| 二分查找 | `#二分` |
| 前缀和 | `#前缀和` |
| 差分数组 | `#差分数组` |
| 优先队列 / 堆 / heap | `#优先队列` |
| 双指针 | `#双指针` |
| 动态规划 / DP | `#动态规划` |
| 背包 | `#背包问题` |
| 区间 / 重叠 / 不重叠 | `#区间调度` |
| 计数 / 多少种方法 | `#计数` |
| 最优化 / 最大最小 | `#最优化` |
| 是否存在 / 可行性 | `#存在性` |

### 代码语言

- C++ 代码用 ` ```c++ `
- Python 代码用 ` ```python `
- 如果同一题有两种语言版本，都保留，各自作为一个版本。

### 方法论部分（可选但推荐）

如果用户写了反思、错误分析或学习笔记，按以下格式整理：

- **错误分析**：在代码中用 `# ❌` / `# ✅` 注释标记，或者在代码块后单独列 markdown 列表
- **口诀记忆**：用引用块格式，每行 4-7 个字
- **对比表格**：用标准 markdown 表格
- **章节标题**：用 `###`

### 始终以如下内容结尾

```
>下一版
```python

```
```

## 输出

- 保存到 `leetcode/problems/oj/leetcode/{题号}-{英文短横标题}.md`
- 如果文件已存在，先询问用户是追加还是覆盖

## 示例

用户说："新做一题 https://leetcode.cn/problems/two-sum/ 第一版用map写过了，第二版GPT帮我优化成unordered_map"

输出文件 `leetcode/problems/oj/leetcode/1-two-sum.md`：

```
#哈希表
[1. 两数之和 - 力扣（LeetCode）](https://leetcode.cn/problems/two-sum/description/)

>第一版通过
```c++
class Solution {
public:
    vector<int> twoSum(vector<int>& nums, int target) {
        map<int, int> v;
        ...
    }
};
```

>GPT改进
```c++
class Solution {
public:
    vector<int> twoSum(vector<int>& nums, int target) {
        unordered_map<int, int> mp;
        ...
    }
};
```

>下一版
```python

```
```

## 注意事项

- 所有标签和版本说明都用**中文**，与已有笔记保持一致
- 标签写在一行，空格分隔，如 `#哈希表 #双指针`
- 链接格式：`leetcode.cn` 用中文标题 + `力扣（LeetCode）`，`leetcode.com` 用英文标题 + `LeetCode`
- 文件名用 kebab-case，与已有文件命名一致
