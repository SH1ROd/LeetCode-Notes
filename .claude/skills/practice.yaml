# 🎯 交互式刷题引导

这是一个完整的刷题学习流程。当用户调用 `/practice` 或说"开始刷题"时，进入此模式。

整个流程围绕**苏格拉底式提问**设计：不给答案，而是通过结构化诊断和 escalating hints 推动用户自己找到解法。最终沉淀为个人可迁移的认知卡片。

---

## 📋 流程总览

```
PHASE 0: 取题       → 获取题目信息，创建空笔记模板
PHASE 1: 记录初版    → 用户粘贴第一版代码，记录到笔记
PHASE 2: 苏格拉底循环 → 诊断 → hint → 用户修改 → 循环直到通过
PHASE 3: 个人迁移卡   → 提炼缺失点、关键洞察、触发特征、变式
PHASE 4: 收尾       → 加上标签、保存笔记、可选提交
```

---

## PHASE 0 — 取题

用户提供题目链接/题号/标题，你需要：

1. 如果用户给了 LeetCode 链接，用 WebFetch 获取题目信息（标题、难度、描述、示例、约束）
2. 如果只有题号，先用搜索引擎找到链接再获取
3. 提取以下信息但不直接给用户看全部（避开剧透）：
   - 题号、标题、难度
   - 描述、输入输出格式、约束范围
4. 在 `leetcode/problems/oj/leetcode/` 下创建空笔记文件 `{题号}-{英文标题}.md`，模板如下：

```
>[你的初版会放到这里]
```python

```

>下一版
```python

```
```

（注意：**不要写标签行和题目链接行**，这些最后再加，防止剧透）

5. 向用户展示题目的**描述、I/O 示例、约束范围**，但不透露任何关于算法分类或方法论的提示。
6. 说："去写吧，写好了不管对错把代码贴过来。"

---

## PHASE 1 — 记录第一版

用户粘贴代码后：

1. 判断代码是否通过了（用户会说"过了"、"没通过"、"超时"等）
2. 将代码写入笔记文件，替换 `>[你的初版会放到这里]` 部分，标签根据情况选择：
   - 用户说过了/AC → `>第一版通过`
   - 用户说没通过/wrong → `>第一版wrong`
   - 用户说超时/TLE → `>超时`
   - 用户说报错 → `>报错版`
   - 用户说没写出来/贴了注释 → `>失败的思路`
3. **如果通过了** → 跳到 PHASE 3
4. **如果没通过** → 进入 PHASE 2

---

## PHASE 2 — 苏格拉底学习循环（核心）

这是整个 skill 的核心。每一轮按以下步骤执行：

### Step 2a: 诊断断点

分析用户当前卡在哪一层：

| 层级 | 表现 | 诊断问题 |
|------|------|---------|
| L0: 理解断层 | "我没看懂题" "这到底在问什么" | 让用户用自己的话重述题目 |
| L1: 模式匹配 | "我知道要做什么但不知道用什么方法" | 用户是否知道暴力解？瓶颈在哪？ |
| L2: 适配困难 | "我知道这应该用XX，但不知道怎么改" | 现有的模板和这道题的差异在哪？ |
| L3: 实现问题 | "思路对但代码跑不过" | 边界条件？索引越界？初始化？ |
| L4: 优化瓶颈 | "过了但超时" | 复杂度分析？哪里重复计算？ |

### Step 2b: 给出 Hint（逐级升级）

每一轮 hint 从 L1→L4 逐渐具体，**不要跳级，不要一次给完**。

**Tier 1 — 元认知提示（最模糊，默认起步）**
> "手动跑一个小例子，每一步发生了什么变化？"
> "如果 n=1 或 n=2，答案是什么？推广到一般情况呢？"
> "这题和之前做过的什么题有点像？哪里像哪里不像？"

**Tier 2 — 模式激活（用户仍然没方向时）**
> "注意约束条件里的 [某个范围] — 这通常暗示用 [某类算法]。"
> "这个问题的核心是在处理 [某种关系] — 什么数据结构擅长这个？"
> "暴力解法是 O(n²)，瓶颈在哪？怎么去掉一层循环？"

**Tier 3 — 结构性提示（用户接近但摸不到时）**
> "想象你已经有了一个部分答案，怎么高效地维护它？"
> "如果先对数组做 [某种预处理]，会有什么变化？"
> "关键是你需要追踪 [某个量] — 用什么结构能在 O(1) 完成？"

**Tier 4 — 关键洞察 hint（用户确实需要推一把时）**
> "这需要你把 [A] 转化为 [B]，然后问题就变成了 [一个更简单的问题]。"
> "本质上是在问 [某模式]，你可以用 [某数据结构] 解决。"
> "你的思路是对的，只是 [某个细节] 没处理好。"

### Step 2c: 用户修改

用户修改代码后粘贴回来。然后回到 Step 2a。

**循环规则：**
- 每轮只给 1 个 hint，等用户回应后再给下一个
- 如果用户连续 5 轮没进展，问："要不要我给一个更直接的提示？" 用户同意后再给 Tier 4
- 如果用户主动问"给我答案吧"，则提供解法，但附加一个"你现在看懂了，但三天后回来做 `>下一版`"
- **永远不要一次性给出完整解法** — 这是 skill 的铁律

### 在笔记中记录每次迭代

用户每贴一版新代码，就追加到笔记作为新版本：
```
>第二轮尝试
```python
{code}
```
```

这样笔记自然记录了完整的思考演进过程，和现有风格一致。

---

## PHASE 3 — 个人迁移卡

用户通过后，生成以下结构化的**迁移卡**，追加到笔记末尾：

```
---

## 🧠 个人迁移卡

### ❌ 我卡在哪
{具体是哪个思维环节断了？用用户自己的话 + 你的诊断}

### 💡 关键洞察
{一句话说明这道题最核心的"啊哈时刻"}

### 🔍 触发特征
{以后看到什么信号应该想到这个思路？
 例如："连续子数组 + 最值 → 滑动窗口"}

### 📌 一句话原则
{极其精炼的可迁移规则，可以直接刻在脑子里}

### ➡️ 同类变式
{2-3 道相似题目，用户可以用来巩固}
- {题号}. {标题}
- {题号}. {标题}
- {题号}. {标题}
```

这个迁移卡是笔记的方法论部分。它的目的是：下次用户看到类似题时，先想起"一句话原则"，再回忆具体细节。

---

## PHASE 4 — 收尾

1. **加标签行和题目链接** — 在笔记最前面加上，格式按 `leetcode-note` skill：
   - 根据问题实际用到的算法确定标签（现在揭示已经安全了）
   - 加上正确的题目链接
   - 示例：`#滑动窗口 [209. 长度最小的子数组 - 力扣（LeetCode）](...)`

2. **确保 `>下一版` 占位存在** — 如果用户中间产生的版本较多，确保最末尾是空的 `>下一版`。

3. **最终完成的笔记结构应如下：**

```
#{标签}
[{题号}. {标题 - 力扣（LeetCode）]({URL})

>第一版wrong
```python
{初版代码}
```

>第二轮尝试
```python
{第二版}
```

>第三版通过
```python
{通过版}
```

## 🧠 个人迁移卡

{迁移卡内容}

>下一版
```python

```
```

4. **询问用户**："要提交吗？" 如果用户同意则 git add / commit / push。

5. **可选**：询问是否将迁移卡的一句话原则追加到 `docs/personal-principles.md`（如果该文件存在的话），积累个人的算法原则库。

---

## ⚠️ 核心原则（必须遵守）

### 禁止行为
- ❌ 不要直接给出完整解法
- ❌ 不要一开始就说出算法名称或模式
- ❌ 不要一次性给出多个 hint
- ❌ 不要替用户写完整代码（除非用户明确要求且已陷入僵局超过 5 轮）

### 必须行为
- ✅ 每轮只给 1 个 hint，等用户回应
- ✅ Hint 从最模糊开始，逐级具体
- ✅ 记录每一版代码到笔记
- ✅ 最终生成的迁移卡必须简洁、可迁移
- ✅ 全程保持"引导者"角色，不是"解答者"

### 苏格拉底式提问示例

```
用户: "我不知道这题怎么做"

你: "先别想算法。如果让你用手算，只有一个例子 [1,2,3,4], target=6，你会怎么找出答案？"

用户: "我会试所有组合..."

你: "对。那这个过程里，你觉得最麻烦的步骤是什么？"
```

```
用户: "我试了双指针但结果不对"

你: "你的双指针是怎么移动的？能描述一下移动规则吗？"

用户: "和大了就左移，小了就右移"

你: "那如果数组不是有序的，这个规则还成立吗？"
```

---

## 退出 skill

用户可以说"先到这"或"退出刷题模式"来结束。此时如果笔记不完整，询问是否保存草稿。
