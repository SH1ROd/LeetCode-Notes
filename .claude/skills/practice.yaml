# 🎯 刷题引导（Quick + Deep 双模式）

一键完成从取题到整理笔记的全流程。根据用户状态自动切换模式：

- **Quick 模式**：一次通过 → 格式化整理 + 可选总结
- **Deep 模式**：卡住/失败 → 苏格拉底式引导循环

---

## 📋 流程总览

```
PHASE 0: 取题         获取题目，创建空笔记模板（无标签，防止剧透）
PHASE 1: 记录第一版    用户贴代码
    ├── ✅ 过了 → Quick 模式 → 跳 PHASE 3
    └── ❌ 没过 → Deep 模式 → PHASE 2
PHASE 2: 苏格拉底循环  诊断 → hint → 用户修改 → 循环直到通过
PHASE 3: 收尾         标签 + 迁移卡 + 格式化 + 可选提交
```

---

## PHASE 0 — 取题

用户提供题目信息，**支持自然语言混合输入**。Claude 自动从中提取题号/标题/链接，忽略多余描述。

例：`刷题 第3题 无重复字符的最长子串 我用滑动窗口做的但结果不对` → 提取到 3 号题。

具体支持以下格式：

| 输入示例 | 说明 |
|---------|------|
| `1` 或 `第1题` | 题号自动匹配 |
| `two-sum` 或 `Two Sum` 或 `两数之和` | 英文/中文题目名 |
| `https://leetcode.cn/problems/two-sum/` | 完整链接直接取 |

查找方法：
1. **题号/中文名/英文名** → 先用 WebSearch 搜 `LeetCode {输入}` 找到链接
2. **拿到链接** → 用 WebFetch 获取题目信息（标题、难度、描述、示例、约束）
3. 在 `leetcode/problems/oj/leetcode/` 创建空笔记 `{题号}-{英文slug}.md`：

```
>[你的初版会放到这里]
```python

```

>下一版
```python

```
```

3. **不要写标签行和链接行**（防剧透）
4. 展示题目描述、I/O 示例、约束范围，不说算法分类
5. 说："去写吧，写好了贴过来"

---

## PHASE 1 — 记录第一版 + 模式分支

用户粘贴代码后判断：

| 用户说 | 标签 |
|--------|------|
| 过了/AC/一次过 | `>第一版通过` → **Quick 模式** |
| 没通过/wrong | `>第一版wrong` → **Deep 模式** |
| 超时/TLE | `>超时` → **Deep 模式** |
| 报错 | `>报错版` → **Deep 模式** |
| 没写出来/只有注释 | `>失败的思路` → **Deep 模式** |

写入笔记，替换 `>[你的初版会放到这里]`。

### Quick 模式入口
用户一次过了 → 跳到 PHASE 3（不进入苏格拉底循环）

### Deep 模式入口
用户卡住了 → 进入 PHASE 2

---

## PHASE 2 — 苏格拉底学习循环（仅 Deep 模式）

### Step 2a: 诊断断点

| 层级 | 表现 | 入门问题 |
|------|------|---------|
| L0: 理解断层 | "没看懂题" | 用自己的话重述题目 |
| L1: 模式匹配 | "不知道用什么方法" | 暴力解是什么？瓶颈在哪？ |
| L2: 适配困难 | "知道用XX但不知道怎么改" | 现有模板和这题的差异？ |
| L3: 实现问题 | "思路对但跑不过" | 边界条件？索引？初始化？ |
| L4: 优化瓶颈 | "过了但超时" | 复杂度？哪重复计算？ |

### Step 2b: 逐级 Hint

**铁律：每轮只给 1 个 hint，等用户回应。**

**Tier 1 — 元认知**
> "手动跑一个小例子，每一步发生了什么？"
> "如果 n=1 答案是什么？扩展到一般情况？"

**Tier 2 — 模式激活**
> "约束 [某个范围] 暗示不能用 O(n²)"
> "问题核心是处理 [某种关系] — 什么数据结构擅长这个？"

**Tier 3 — 结构提示**
> "如果先做 [某种预处理]，会怎样？"
> "关键是要追踪 [某个量] — 什么结构能在 O(1) 完成？"

**Tier 4 — 关键洞察**
> "你的思路是对的，只是 [某细节] 没处理好"
> "本质上是在问 [某模式]"

**兜底：** 用户连续 5 轮没进展或主动要答案 → 给解法，但附加"三天后回来做 `>下一版`"

### 记录迭代

每贴一版新代码就追加到笔记：
```
>第二轮尝试
```python
{code}
```
```

---

## PHASE 3 — 收尾（Quick & Deep 共用）

### 3a. 个人迁移卡（通过后生成）

追加到笔记末尾：

```
---

## 🧠 个人迁移卡

### ❌ 我卡在哪
{Quick: 无卡顿 / Deep: 诊断结果}

### 💡 关键洞察
{核心啊哈时刻}

### 🔍 触发特征
{什么信号应该想到这个思路}

### 📌 一句话原则
{可迁移规则}

### ➡️ 同类变式
- {题号}. {标题}
- {题号}. {标题}
```

### 3b. 加标签和题目链接

根据问题实际用到的算法确定标签。标签速查：

| 算法模式 | 标签 |
|---------|------|
| 哈希表/map/set/dict | `#哈希表` |
| 字符串/子串/回文 | `#字符串` |
| 滑动窗口 | `#滑动窗口` |
| 栈/括号/单调栈 | `#栈` |
| 链表 | `#链表` |
| 二分查找 | `#二分` |
| 前缀和 | `#前缀和` |
| 差分数组 | `#差分数组` |
| 优先队列/堆 | `#优先队列` |
| 双指针 | `#双指针` |
| 动态规划/DP | `#动态规划` |
| 背包 | `#背包问题` |
| 区间调度 | `#区间调度` |
| 计数/方案数 | `#计数` |
| 最优化 | `#最优化` |
| 存在性/可行性 | `#存在性` |

### 3c. 链接格式

- `leetcode.cn` → 中文标题 + `力扣（LeetCode）`
- `leetcode.com` → 英文标题 + `LeetCode`

### 3d. 最终笔记结构

Quick 模式（无迁移卡时可有可无）：
```
#{标签}
[{题号}. {标题 - 力扣（LeetCode）]({URL})

>第一版通过
```python
{代码}
```

[可选：## 🧠 个人迁移卡]

>下一版
```python

```
```

Deep 模式：
```
#{标签}
[{题号}. {标题 - 力扣（LeetCode）]({URL})

>第一版wrong
```python
{初版}
```

>第二轮尝试
```python
{第二版}
```

>第N版通过
```python
{通过版}
```

## 🧠 个人迁移卡
[迁移卡内容]

>下一版
```python

```
```

### 3e. 最后

- 问："要提交吗？" → 是则 git add / commit / push
- Quick 模式下额外问："这次一次过了，有什么想记录的心得吗？" → 如果有则加到迁移卡

---

## 核心原则

- ❌ 永远不直接给完整解法（除非超过 5 轮或用户主动要求）
- ❌ 不一次性给多个 hint
- ❌ PHASE 0 不透露算法标签/分类
- ✅ 每轮 1 个 hint，等回应
- ✅ 记录每一版代码到笔记
- ✅ 迁移卡必须简洁可迁移
- ✅ 始终保持引导者角色

## 退出

用户说"先到这" → 保存草稿。
