# Update README Skill

当用户说"更新上下文到README"或调用 `/update-readme` 时，执行此流程。

## 工作流程

### 1. 扫描全库

读取 `leetcode/problems/oj/leetcode/` 下所有 `.md` 文件，对每个文件提取：

- **文件名** → 题号
- **第一行标签** → `#哈希表` 等
- **题目链接**
- **版本数** → 统计 `>xxx` 标签数量
- **是否有方法论** → 检查代码块后是否有 `##` / `###` / `---` / 表格 / 口诀等内容
- **是否有错误版本** → 标签包含 "wrong / 错误 / 超时 / 报错 / 失败" 等
- **是否有 `>下一版` 占位**
- **编程语言** → `python` / `c++`

### 2. 计算统计数据

按标签归类题目数，并按以下维度聚合分数：

| 维度 | 包含标签 |
|------|---------|
| 哈希表/字符串 | `#哈希表` `#字符串` |
| 滑动窗口/双指针 | `#滑动窗口` `#双指针` |
| 前缀和/差分 | `#前缀和` `#差分数组` |
| 栈/链表 | `#栈` `#链表` |
| DP-背包 | `#背包问题` |
| DP-区间/线性/其他 | `#区间调度` `#数论` (非背包动态规划) |
| 优先队列/二分 | `#优先队列` `#二分` |
| 图/树/DFS/BFS | `#图` `#树` (目前空白) |

### 3. 维度评分规则

每个维度 0-10 分，综合评估：

- **题目数**：0 题 = 0分，1-2 题 = 2分，3-4 题 = 4分，5-6 题 = 6分，7+ 题 = 7分基分
- **方法论深度**：有方法论 +1，有口诀/模板 +1，有完整推导 +1
- **错误迭代**：有多个版本的错误→正确演进 +1

### 4. 生成 README（三个独立文件）

README 拆分为三个独立文件，顶部导航栏互相链接：

| 文件 | 语言 | 导航链接 |
|------|------|---------|
| `README.md` | 简体中文 | `README.zh-TW.md` · `README.en.md` |
| `README.zh-TW.md` | 繁體中文 | `README.md` · `README.en.md` |
| `README.en.md` | English | `README.md` · `README.zh-TW.md` |

每个文件顶部和底部都有导航栏指向另两个版本。需**完整生成三个文件**。

**繁体中文术语对照：**
```
数组→陣列, 字符串→字串, 滑动窗口→滑動視窗, 指针→指針,
队列→佇列, 链表→鏈表, 前缀→前綴, 递归→遞迴,
搜索→搜尋, 优先队列→優先佇列, 面试→面試,
准备→準備, 笔记→筆記, 建议→建議, 总结→總結,
数组→陣列, 数字→數值, 题目→題目, 标签→標籤,
考点→考點, 基于→基於, 覆盖→覆蓋
```

**数据一致性：** 雷达图数字、统计数字、题目列表在三个文件中必须完全一致。只有文案/术语在不同语言间切换。

**导航栏格式：**
```html
<p align="center">
  <a href="README.md">简体中文</a> ·
  <a href="README.zh-TW.md">繁體中文</a> ·
  <a href="README.en.md">English</a>
</p>
```

### 5. 近期刷题列表

从 `git log --oneline -15` 获取最近提交，提取题目信息，更新到三个语言版本的"近期刷题"部分。

### 6. 雷达图格式

使用以下格式绘制文本雷达图（三语版本中术语对应翻译）：

```
                     图/树/DFS/BFS (N)
                         │
                    N    │     10
                  ┌──────┼──────┐
     哈希表/字符串 │  N   │  N   │ 滑动窗口/双指针
       (N)        │      │      │    (N)
                  │      │      │
                  │  N   │  N   │
       栈/链表 ───┤      │      ├─── 前缀和/差分
       (N)       │      │      │      (N)
                  │  N   │  N   │
                  │      │      │
      DP-区间/线性 │  N   │  N   │ 优先队列/二分
       (N)        └──────┴──────┘      (N)
                      │
                    N     │
                     图论完全空白
```

### 注意事项

- 三个语言版本必须完整独立，不要混排
- 顶部导航栏始终提供三个锚点链接，每个语言版本底部也有返回链接
- 如果用户刷了图/树/DFS/BFS 题目，更新所有三个语言版本中雷达图对应位置
- 不要删除已有的方法论描述，只追加新内容
- 保持简体中文版本作为第一个语言（默认展示）
