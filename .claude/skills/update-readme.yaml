# Update README Skill

当用户说"更新上下文到README"或调用 `/update-readme` 时，执行此流程。

## 工作流程

### 1. 扫描全库

读取 `leetcode/problems/oj/leetcode/` 下所有 `.md` 文件，对每个文件提取：

- **文件名** → 题号
- **第一行标签** → `#哈希表` 等
- **题目链接**
- **版本数** → 统计 `>xxx` 标签数量
- **是否有方法论** → 检查代码块后是否有 `##` / `###` / `---` / 表格 / 口诀等内容
- **是否有错误版本** → 标签包含 "wrong / 错误 / 超时 / 报错 / 失败" 等
- **是否有 `>下一版` 占位**
- **编程语言** → `python` / `c++`

### 2. 计算统计数据

按标签归类题目数，并按以下维度聚合分数：

| 维度 | 包含标签 |
|------|---------|
| 哈希表/字符串 | `#哈希表` `#字符串` |
| 滑动窗口/双指针 | `#滑动窗口` `#双指针` |
| 前缀和/差分 | `#前缀和` `#差分数组` |
| 栈/链表 | `#栈` `#链表` |
| DP-背包 | `#背包问题` |
| DP-区间/线性/其他 | `#区间调度` `#数论` (非背包动态规划) |
| 优先队列/二分 | `#优先队列` `#二分` |
| 图/树/DFS/BFS | `#图` `#树` (目前空白) |

### 3. 维度评分规则

每个维度 0-10 分，综合评估：

- **题目数**：0 题 = 0分，1-2 题 = 2分，3-4 题 = 4分，5-6 题 = 6分，7+ 题 = 7分基分
- **方法论深度**：有方法论 +1，有口诀/模板 +1，有完整推导 +1
- **错误迭代**：有多个版本的错误→正确演进 +1

### 4. 生成 README

严格保持 README.md 的现有格式结构（三语标题 + 总览表格 + 雷达图 + 各维度详解 + 刷题建议 + 方法论 + 近期刷题 + 求职准备 + 项目地图），但更新所有数字和分析文本。

### 5. 近期刷题列表

从 `git log --oneline -15` 获取最近提交，提取题目信息，更新到"近期刷题"部分。

### 6. 雷达图格式

使用以下格式绘制文本雷达图：

```
                     图/树/DFS/BFS (N)
                         │
                    N    │     10
                  ┌──────┼──────┐
     哈希表/字符串 │  N   │  N   │ 滑动窗口/双指针
       (N)        │      │      │    (N)
                  │      │      │
                  │  N   │  N   │
       栈/链表 ───┤      │      ├─── 前缀和/差分
       (N)       │      │      │      (N)
                  │  N   │  N   │
                  │      │      │
      DP-区间/线性 │  N   │  N   │ 优先队列/二分
       (N)        └──────┴──────┘      (N)
                      │
                    N     │
                     图论完全空白
```

用 `█` 填充的条形图展示各阶段进度，如：
```
阶段 1: 基础入门    ████████████████████░░░░░░░░░░░░   ~55%
```

### 注意事项

- 所有标签和版本说明保持中文
- 保持三语标题（简体中文为主，同时列出繁体中文和英文）
- 如果新增了标签类别，更新标签速查表
- 如果用户刷了图/树/DFS/BFS 题目，更新雷达图对应位置
- 不要删除已有的方法论描述，只追加新内容
